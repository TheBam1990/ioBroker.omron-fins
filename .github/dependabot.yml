version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      time: "20:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 20
    assignees:
      - TheBam1990
    versioning-strategy: increase
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '44 2 24 * *'
    open-pull-requests-limit: 15
